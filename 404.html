<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - الصفحة غير موجودة</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Cairo', sans-serif;
      direction: rtl;
      background: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 1rem;
    }
    .code {
      font-size: 120px;
      font-weight: 700;
      color: #c9a84c;
      line-height: 1;
      letter-spacing: -6px;
    }
    .divider {
      width: 48px;
      height: 2px;
      background: #c9a84c;
      margin: 20px auto;
      opacity: 0.4;
      border-radius: 2px;
    }
    .title {
      font-size: 22px;
      font-weight: 600;
      color: #f0e6c8;
      margin-bottom: 12px;
    }
    .desc {
      font-size: 14px;
      color: #888;
      max-width: 320px;
      line-height: 1.9;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #c9a84c;
      color: #111;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Cairo', sans-serif;
      padding: 11px 28px;
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn:hover { background: #b8943a; }
    .btn svg { width: 15px; height: 15px; }
    .footer {
      position: absolute;
      bottom: 24px;
      font-size: 12px;
      color: #333;
    }
    .footer strong { color: #c9a84c; font-weight: 600; }
  </style>
</head>
<body>

  <div class="code">404</div>
  <div class="divider"></div>
  <div class="title">الصفحة غير موجودة</div>
  <div class="desc">عذراً، الصفحة التي تبحث عنها غير موجودة</div>

  <a href="index.html" class="btn">
    <svg fill="none" viewBox="0 0 24 24">
      <path d="M19 12H5M12 5l-7 7 7 7" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    العودة للرئيسية
  </a>

  <div class="footer">صُمِّم بواسطة <strong>محمد المقبالي</strong></div>

</body>
</html>
